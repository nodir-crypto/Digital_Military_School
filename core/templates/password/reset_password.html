{% extends 'base.html' %}
{% load static %}

{% block title %}Yangi parol | DMS Academy{% endblock %}

{% block content %}
<div class="login-page-wrapper d-flex align-items-center justify-content-center min-vh-100">
    <div class="login-bg-decor">
        <div class="circle circle-1"></div>
        <div class="circle circle-2"></div>
        <div class="circle circle-3"></div>
    </div>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5 animate__animated animate__fadeInUp">

                <div class="card login-card border-0 shadow-premium">
                    <div class="card-body p-4 p-md-5">

                        <div class="text-center mb-5">
                            <div class="reset-icon-container mx-auto mb-4">
                                <div class="reset-icon-outer">
                                    <div class="reset-icon-inner">
                                        <i class="fas fa-fingerprint text-white"></i>
                                    </div>
                                </div>
                            </div>
                            <h3 class="fw-black text-slate-900 letter-spacing-tight mb-2">Xavfsiz Yangilash</h3>
                            <p class="text-muted small fw-medium">Profilingiz uchun yangi kuchli parol kiriting</p>
                        </div>

                        <form method="POST" id="resetPasswordForm" autocomplete="off">
                            {% csrf_token %}

                            <div class="form-group-premium mb-4">
                                <label class="label-premium">Yangi maxfiy parol</label>
                                <div class="input-wrapper-premium">
                                    <i class="fas fa-key input-icon"></i>
                                    <input type="password" name="pass1" id="pass1"
                                           class="form-control-premium" placeholder="••••••••"
                                           required minlength="8">
                                    <div class="toggle-password-btn" onclick="togglePass('pass1')">
                                        <i class="fas fa-eye" id="icon-pass1"></i>
                                    </div>
                                </div>
                                <div class="password-strength-meter mt-2">
                                    <div class="meter-bar" id="strength-bar"></div>
                                </div>
                            </div>

                            <div class="form-group-premium mb-4">
                                <label class="label-premium">Parolni tasdiqlang</label>
                                <div class="input-wrapper-premium">
                                    <i class="fas fa-shield-check input-icon"></i>
                                    <input type="password" name="pass2" id="pass2"
                                           class="form-control-premium" placeholder="••••••••"
                                           required>
                                    <div class="toggle-password-btn" onclick="togglePass('pass2')">
                                        <i class="fas fa-eye" id="icon-pass2"></i>
                                    </div>
                                </div>
                                <div id="matchMessage" class="feedback-badge d-none">
                                    <i class="fas fa-info-circle me-1"></i> <span></span>
                                </div>
                            </div>

                            <div class="d-grid mt-5">
                                <button type="submit" class="btn btn-login-premium py-3" id="submitBtn" disabled>
                                    <span class="btn-text">PAROLNI SAQLASH</span>
                                    <i class="fas fa-save ms-2"></i>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>

                <div class="text-center mt-4">
                    <p class="text-muted smallest fw-bold text-uppercase opacity-50 letter-spacing-wide">
                        &copy; 2026 DMS Academy <br>
                        Axborot xavfsizligi tizimi
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    /* DMS Academy Global Variables */
    :root {
        --primary-gradient: linear-gradient(135deg, #4F46E5 0%, #3B82F6 100%);
        --success-color: #10B981;
        --danger-color: #EF4444;
        --slate-900: #0f172a;
    }

    .fw-black { font-weight: 900; }
    .letter-spacing-tight { letter-spacing: -1px; }

    /* Page Setup */
    .login-page-wrapper { background-color: #f8fafc; position: relative; overflow: hidden; }

    /* Background Circles */
    .login-bg-decor .circle { position: absolute; border-radius: 50%; filter: blur(100px); opacity: 0.15; z-index: 0; }
    .circle-1 { width: 400px; height: 400px; background: #4F46E5; top: -100px; right: -100px; }
    .circle-2 { width: 300px; height: 300px; background: #3B82F6; bottom: -50px; left: -50px; }
    .circle-3 { width: 250px; height: 250px; background: #6366f1; top: 40%; left: 10%; }

    /* Premium Card */
    .login-card {
        background: rgba(255, 255, 255, 0.9);
        backdrop-filter: blur(25px);
        border: 1px solid rgba(255, 255, 255, 0.5);
        border-radius: 40px;
        position: relative; z-index: 1;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
    }

    /* Icon Styling */
    .reset-icon-container { width: 85px; height: 85px; display: flex; align-items: center; justify-content: center; }
    .reset-icon-outer {
        width: 80px; height: 80px; background: rgba(79, 70, 229, 0.1);
        border-radius: 28px; display: flex; align-items: center; justify-content: center;
        transform: rotate(-6deg); border: 2px dashed rgba(79, 70, 229, 0.2);
    }
    .reset-icon-inner {
        width: 60px; height: 60px; background: var(--primary-gradient);
        border-radius: 20px; display: flex; align-items: center; justify-content: center;
        box-shadow: 0 10px 20px -5px rgba(79, 70, 229, 0.4); transform: rotate(6deg);
    }

    /* Input Design */
    .label-premium {
        font-size: 0.7rem; font-weight: 800; color: #64748b;
        text-transform: uppercase; margin-bottom: 10px; padding-left: 5px;
    }
    .input-wrapper-premium { position: relative; }
    .input-icon {
        position: absolute; left: 20px; top: 50%;
        transform: translateY(-50%); color: #94a3b8; transition: 0.3s;
    }
    .form-control-premium {
        width: 100%; padding: 16px 50px 16px 55px;
        background: #f1f5f9; border: 2px solid transparent;
        border-radius: 20px; font-weight: 600; color: var(--slate-900);
        transition: all 0.3s ease;
    }
    .form-control-premium:focus {
        outline: none; background: #fff; border-color: #4F46E5;
        box-shadow: 0 10px 20px -10px rgba(79, 70, 229, 0.2);
    }
    .toggle-password-btn {
        position: absolute; right: 20px; top: 50%;
        transform: translateY(-50%); color: #94a3b8; cursor: pointer;
    }

    /* Feedback Badges */
    .feedback-badge {
        font-size: 0.75rem; font-weight: 700; padding: 8px 12px;
        border-radius: 10px; margin-top: 10px; display: inline-block;
    }
    .text-success { background: #ecfdf5; color: var(--success-color); }
    .text-danger { background: #fef2f2; color: var(--danger-color); }

    /* Strength Meter */
    .password-strength-meter { height: 4px; background: #e2e8f0; border-radius: 10px; overflow: hidden; }
    .meter-bar { height: 100%; width: 0%; transition: 0.5s; background: var(--danger-color); }

    /* Button */
    .btn-login-premium {
        background: var(--primary-gradient); color: white; border: none;
        border-radius: 20px; font-weight: 800; transition: all 0.3s ease;
        box-shadow: 0 10px 20px -5px rgba(79, 70, 229, 0.4);
    }
    .btn-login-premium:hover:not(:disabled) { transform: translateY(-2px); opacity: 0.9; }
    .btn-login-premium:disabled { opacity: 0.5; cursor: not-allowed; filter: grayscale(1); }
</style>

<script>
    // Password Toggle
    function togglePass(id) {
        const input = document.getElementById(id);
        const icon = document.getElementById('icon-' + id);
        if (input.type === "password") {
            input.type = "text";
            icon.classList.replace('fa-eye', 'fa-eye-slash');
        } else {
            input.type = "password";
            icon.classList.replace('fa-eye-slash', 'fa-eye');
        }
    }

    const pass1 = document.getElementById('pass1');
    const pass2 = document.getElementById('pass2');
    const message = document.getElementById('matchMessage');
    const strengthBar = document.getElementById('strength-bar');
    const btn = document.getElementById('submitBtn');

    // Simple Strength Meter
    pass1.addEventListener('input', () => {
        let val = pass1.value;
        let width = val.length * 10;
        if(width > 100) width = 100;
        strengthBar.style.width = width + '%';

        if(val.length < 5) strengthBar.style.background = '#EF4444';
        else if(val.length < 10) strengthBar.style.background = '#F59E0B';
        else strengthBar.style.background = '#10B981';

        validate();
    });

    function validate() {
        if (pass2.value.length > 0) {
            message.classList.remove('d-none');
            const span = message.querySelector('span');
            if (pass1.value === pass2.value && pass1.value.length >= 8) {
                span.textContent = "Parollar mos keldi va xavfsiz";
                message.className = "feedback-badge text-success";
                btn.disabled = false;
            } else {
                span.textContent = pass1.value !== pass2.value ? "Parollar mos emas" : "Parol juda qisqa (kamida 8 ta)";
                message.className = "feedback-badge text-danger";
                btn.disabled = true;
            }
        } else {
            message.classList.add('d-none');
            btn.disabled = true;
        }
    }

    pass2.addEventListener('input', validate);

    document.getElementById('resetPasswordForm').onsubmit = function() {
        btn.innerHTML = `<span class="spinner-border spinner-border-sm me-2"></span> SAQLANMOQDA...`;
    };
</script>
{% endblock %}
