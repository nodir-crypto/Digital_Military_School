{% extends 'base.html' %}
{% load static %}

{% block content %}
<style>
    /* Premium Background: Harakatlanuvchi gradient */
    .premium-404 {
        min-height: 80vh;
        display: flex;
        align-items: center;
        background: #0f172a; /* Deep Dark Space */
        overflow: hidden;
        position: relative;
        font-family: 'Inter', -apple-system, sans-serif;
    }

    /* Fon uchun abstrakt shakllar */
    .orb {
        position: absolute;
        width: 400px;
        height: 400px;
        border-radius: 50%;
        filter: blur(80px);
        z-index: 0;
        opacity: 0.4;
    }
    .orb-1 { background: #3b82f6; top: -100px; left: -100px; }
    .orb-2 { background: #10b981; bottom: -100px; right: -100px; }

    /* Glassmorphism Card */
    .glass-card {
        background: rgba(255, 255, 255, 0.03);
        backdrop-filter: blur(15px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 30px;
        padding: 4rem 2rem;
        position: relative;
        z-index: 1;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }

    /* 404 Raqami uchun Glitch effekti */
    .glitch-wrapper {
        position: relative;
        font-size: 12rem;
        font-weight: 800;
        line-height: 1;
        color: #fff;
        margin-bottom: 1rem;
    }

    .glitch-wrapper::before, .glitch-wrapper::after {
        content: "404";
        position: absolute;
        top: 0; left: 0; width: 100%; height: 100%;
        opacity: 0.8;
    }

    .glitch-wrapper::before {
        color: #ff00c1;
        z-index: -1;
        animation: glitch 0.3s cubic-bezier(.25, .46, .45, .94) both infinite;
    }

    .glitch-wrapper::after {
        color: #00fff9;
        z-index: -2;
        animation: glitch 0.3s cubic-bezier(.25, .46, .45, .94) reverse both infinite;
    }

    /* Tugmalar - Modern UI */
    .btn-premium {
        background: linear-gradient(90deg, #3b82f6, #2dd4bf);
        border: none;
        color: white;
        padding: 15px 40px;
        border-radius: 12px;
        font-weight: 600;
        transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        text-decoration: none;
        display: inline-flex;
        align-items: center;
    }

    .btn-premium:hover {
        transform: scale(1.05) translateY(-5px);
        box-shadow: 0 15px 30px rgba(59, 130, 246, 0.4);
        color: #fff;
    }

    .btn-outline-premium {
        border: 1px solid rgba(255,255,255,0.2);
        color: rgba(255,255,255,0.8);
        padding: 15px 40px;
        border-radius: 12px;
        transition: all 0.3s;
        text-decoration: none;
    }

    .btn-outline-premium:hover {
        background: rgba(255,255,255,0.05);
        border-color: #fff;
        color: #fff;
    }

    /* Animatsiyalar */
    @keyframes glitch {
        0% { transform: translate(0); }
        20% { transform: translate(-3px, 3px); }
        40% { transform: translate(-3px, -3px); }
        60% { transform: translate(3px, 3px); }
        80% { transform: translate(3px, -3px); }
        100% { transform: translate(0); }
    }

    /* Mobil moslashuv */
    @media (max-width: 768px) {
        .glitch-wrapper { font-size: 8rem; }
        .glass-card { padding: 2rem 1rem; }
    }
</style>

<div class="premium-404">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-7 col-md-10 text-center">
                <div class="glass-card">
                    <div class="glitch-wrapper">404</div>

                    <h2 class="text-white display-5 fw-bold mb-3">Tizimda uzilishmi?</h2>
                    <p class="text-light opacity-75 lead mb-5">
                        Siz izlayotgan sahifa raqamli bo'shliqqa g'oyib bo'lgan ko'rinadi.
                        Xavotir olmang, bizning navigatorlarimiz sizni xavfsiz hududga qaytaradi.
                    </p>

                    <div class="d-flex flex-wrap justify-content-center gap-3">
                        <a href="{% url 'home' %}" class="btn-premium">
                            <i class="fas fa-rocket me-2"></i> Dashboardga qaytish
                        </a>
                        <a href="javascript:history.back()" class="btn-outline-premium">
                            <i class="fas fa-chevron-left me-2"></i> Ortga qaytish
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
