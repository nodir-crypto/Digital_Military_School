<div class="bg-white/80 backdrop-blur-sm p-6 rounded-[2rem] shadow-sm border border-slate-100 group hover:shadow-lg transition-all duration-300">
    <div class="flex items-center space-x-4">
        <div class="w-12 h-12 flex items-center justify-center
            {% if color == 'blue' %}bg-blue-100 text-blue-600
            {% elif color == 'green' %}bg-emerald-100 text-emerald-600
            {% elif color == 'amber' %}bg-amber-100 text-amber-600
            {% else %}bg-purple-100 text-purple-600{% endif %}
            rounded-2xl group-hover:scale-110 transition-transform">
            <i class="fas {{ icon }}"></i>
        </div>
        <div>
            <p class="text-[10px] text-slate-400 font-black uppercase tracking-widest">{{ label }}</p>
            <h3 class="text-2xl font-black text-slate-800" {% if id %}id="{{ id }}"{% endif %}>{{ value }}</h3>
        </div>
    </div>
</div>
