{% extends 'base.html' %}
{% load static %}

{% block title %}Analytics Hub | Premium Intelligence{% endblock %}

{% block content %}
<div class="ultimate-dashboard">
    <div class="mesh-bg">
        <div class="mesh-sphere sphere-1"></div>
        <div class="mesh-sphere sphere-2"></div>
    </div>

    <div class="container-fluid py-5 position-relative z-index-2">
        <div class="row g-4 justify-content-center">

            <div class="col-xl-3 col-lg-4">
                <div class="galaxy-card p-4 sticky-top shadow-2xl" style="top: 20px;">
                    <div class="d-flex align-items-center mb-4 pb-3 border-bottom border-white-10">
                        <div class="cyber-icon-box me-3">
                            <i class="fa-solid fa-chart-pie text-cyber"></i>
                        </div>
                        <div>
                            <h6 class="fw-black text-white mb-0 tracking-tighter">ANALYTICS HUB</h6>
                            <span class="smallest text-indigo-light text-uppercase fw-bold">Vizualizatsiya</span>
                        </div>
                    </div>

                    <div class="nav flex-column nav-pills cyber-nav">
                        <button class="nav-link active chart-selector mb-3" data-type="line">
                            <span class="icon-circle me-3"><i class="fas fa-chart-line"></i></span>
                            <span class="fw-bold">Line Dynamics</span>
                        </button>
                        <button class="nav-link chart-selector mb-3" data-type="bar">
                            <span class="icon-circle me-3"><i class="fas fa-chart-bar"></i></span>
                            <span class="fw-bold">Bar Comparison</span>
                        </button>
                        <button class="nav-link chart-selector mb-3" data-type="doughnut">
                            <span class="icon-circle me-3"><i class="fas fa-dot-circle"></i></span>
                            <span class="fw-bold">Structure Pie</span>
                        </button>
                        <button class="nav-link chart-selector mb-3" data-type="radar">
                            <span class="icon-circle me-3"><i class="fas fa-braille"></i></span>
                            <span class="fw-bold">Skill Radar</span>
                        </button>
                    </div>

                    <div class="mt-4 p-4 rounded-4 cyber-score-box">
                        <p class="smallest fw-bold text-muted mb-2 text-uppercase letter-spacing-2">Umumiy natija</p>
                        <h2 class="fw-black mb-0 gradient-text fs-1 text-center">{{ avg_score|floatformat:0 }}%</h2>
                    </div>
                </div>
            </div>

            <div class="col-xl-8 col-lg-8">
                <div class="galaxy-card p-5 shadow-2xl">
                    <div class="mb-5">
                        <h3 id="mainTitle" class="ultra-title-small mb-1">DINAMIK <span class="gradient-text">TAHLIL</span></h3>
                        <p id="chartDesc" class="text-primary fw-medium small">Urinishlar ketma-ketligi bo'yicha tahlil</p>
                    </div>

                    <div style="min-height: 450px; position: relative;">
                        <canvas id="masterAnalyticsChart"></canvas>
                    </div>
                </div>
            </div>

        </div>
    </div>
</div>

<style>
/* DIZAYN TIZIMI */
:root { --deep-bg: #030712; --card-glass: rgba(17, 24, 39, 0.75); --electric-indigo: #6366f1; --cyber-cyan: #22d3ee; --white-10: rgba(255, 255, 255, 0.08); }
.ultimate-dashboard { background-color: var(--deep-bg); min-height: 100vh; font-family: 'Plus Jakarta Sans', sans-serif; color: #f8fafc; position: relative; overflow-x: hidden; }
.mesh-bg { position: absolute; inset: 0; z-index: 1; pointer-events: none; }
.mesh-sphere { position: absolute; border-radius: 50%; filter: blur(120px); opacity: 0.15; }
.sphere-1 { top: -5%; left: -5%; width: 400px; height: 400px; background: var(--electric-indigo); }
.sphere-2 { bottom: 0%; right: -5%; width: 400px; height: 400px; background: var(--cyber-cyan); }
.galaxy-card { background: var(--card-glass); backdrop-filter: blur(25px); border-radius: 35px; border: 1px solid var(--white-10); }
.cyber-nav .nav-link { background: transparent; border: none; color: #94a3b8; padding: 15px; border-radius: 15px; transition: 0.3s; width: 100%; text-align: left; }
.cyber-nav .nav-link.active { background: rgba(99, 102, 241, 0.15); color: #fff; border: 1px solid rgba(99, 102, 241, 0.3); }
.icon-circle { width: 35px; height: 35px; display: inline-flex; align-items: center; justify-content: center; background: var(--white-10); border-radius: 10px; }
.gradient-text { background: linear-gradient(135deg, var(--cyber-cyan), var(--electric-indigo)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.ultra-title-small { font-weight: 800; font-size: 1.8rem; letter-spacing: -1px; }
.cyber-score-box { background: rgba(0,0,0,0.3); border: 1px solid var(--white-10); }
</style>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
document.addEventListener("DOMContentLoaded", function() {
    const timelineData = {{ timeline_data_json|safe }};
    const subjectData = {{ subject_data_json|safe }};
    const ctx = document.getElementById('masterAnalyticsChart').getContext('2d');
    let chart;

    function initChart(type) {
        if (chart) chart.destroy();

        let labels, scores, title, desc, scalesConfig;

        // --- HARD LOGIC SEPARATION ---
        if (type === 'line' || type === 'bar') {
            labels = timelineData.labels; // Sanalar
            scores = timelineData.scores;
            title = "O'ZLASHTIRISH <span class='gradient-text'>DINAMIKASI</span>";
            desc = "Oxirgi 10 ta test natijalari (Vaqt bo'yicha)";
            scalesConfig = {
                y: { beginAtZero: true, max: 100, grid: { color: 'rgba(255,255,255,0.05)' } },
                x: { ticks: { color: '#64748b' } }
            };
        } else {
            labels = subjectData.labels; // Fan nomlari
            scores = subjectData.scores;
            title = "FANLAR <span class='gradient-text'>TAHLILI</span>";
            desc = "Fanlar kesimidagi o'rtacha ko'rsatkichlar";
            scalesConfig = (type === 'radar') ? {
                r: { suggestedMin: 0, suggestedMax: 100, pointLabels: { color: '#94a3b8' } }
            } : {};
        }

        document.getElementById('mainTitle').innerHTML = title;
        document.getElementById('chartDesc').innerText = desc;

        chart = new Chart(ctx, {
            type: type,
            data: {
                labels: labels,
                datasets: [{
                    label: 'Ball (%)',
                    data: scores,
                    backgroundColor: type === 'doughnut' ? ['#6366f1', '#22d3ee', '#a855f7', '#f43f5e'] : 'rgba(99, 102, 241, 0.2)',
                    borderColor: '#6366f1',
                    borderWidth: 2,
                    fill: (type === 'line' || type === 'radar'),
                    tension: 0.4
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: scalesConfig,
                plugins: {
                    legend: { display: type === 'doughnut', position: 'bottom' }
                }
            }
        });
    }

    initChart('line');

    document.querySelectorAll('.chart-selector').forEach(btn => {
        btn.addEventListener('click', function() {
            document.querySelectorAll('.chart-selector').forEach(b => b.classList.remove('active'));
            this.classList.add('active');
            initChart(this.dataset.type);
        });
    });
});
</script>
{% endblock %}
